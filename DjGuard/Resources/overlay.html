<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeratoDJGuard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --alert-bg:   rgba(220, 38, 38, 0.92);
    --alert-text: #ffffff;
    --hist-bg:    rgba(10, 10, 20, 0.88);
    --ok-color:   #22c55e;
    --alert-size: 260px;
    --font-track: 28px;
    --font-sub:   16px;
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── History Panel ── */
  #history-panel {
    position: fixed;
    top: 0; left: 0;
    width: 300px; height: 100%;
    background: var(--hist-bg);
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateX(-16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 10;
  }
  #history-panel.visible { opacity: 1; transform: translateX(0); }

  #hist-header {
    padding: 18px 18px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #hist-count {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
  }

  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #history-list::-webkit-scrollbar { width: 3px; }
  #history-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12); border-radius: 2px;
  }

  .history-item {
    padding: 9px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: slideIn 0.25s ease;
  }
  .history-item.dup { border-left: 3px solid #ef4444; padding-left: 15px; }
  .history-item .h-artist {
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-item .h-title {
    font-size: 11px; color: rgba(255,255,255,0.4);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }

  /* ── Alert Bubble ── */
  #alert-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }

  #alert-bubble {
    width: var(--alert-size);
    height: var(--alert-size);
    border-radius: 50%;
    background: var(--alert-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    text-align: center;
    opacity: 0;
    transform: scale(0.3);
    box-shadow: 0 0 80px rgba(220,38,38,0.55), 0 0 160px rgba(220,38,38,0.25);
  }
  #alert-bubble.show {
    opacity: 1; transform: scale(1);
    transition: opacity 0.35s cubic-bezier(0.34,1.56,0.64,1),
                transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  #alert-bubble.hide {
    opacity: 0; transform: scale(0.55);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  #alert-bubble.pulse { animation: pulseRing 0.9s ease-in-out 3; }

  #alert-icon  { font-size: 30px; margin-bottom: 6px; line-height: 1; }
  #alert-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--alert-text); opacity: 0.65;
    margin-bottom: 5px;
  }
  #alert-artist {
    font-size: var(--font-track); font-weight: 700;
    color: var(--alert-text); line-height: 1.15;
    word-break: break-word; hyphens: auto;
  }
  #alert-title {
    font-size: var(--font-sub); color: var(--alert-text);
    opacity: 0.75; margin-top: 4px; line-height: 1.3;
    word-break: break-word;
  }
  #alert-score {
    margin-top: 9px; font-size: 11px; font-weight: 600;
    color: var(--alert-text); opacity: 0.55;
    background: rgba(255,255,255,0.13);
    border-radius: 20px; padding: 3px 10px;
  }

  /* ── Similar Panel ── */
  #similar-panel {
    position: fixed;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    background: rgba(12,12,22,0.9);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 14px 18px;
    min-width: 300px; max-width: 500px;
    opacity: 0;
    transition: opacity 0.4s ease 0.25s;
    z-index: 50;
  }
  #similar-panel.show { opacity: 1; }
  #similar-header {
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
    margin-bottom: 9px;
  }
  .similar-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px; color: rgba(255,255,255,0.72);
  }
  .similar-item:last-child { border-bottom: none; }
  .similar-score {
    font-size: 11px; font-weight: 600; padding: 2px 7px;
    border-radius: 10px; background: rgba(245,158,11,0.18);
    color: #f59e0b; flex-shrink: 0; margin-left: 10px;
  }

  /* ── Status dot ── */
  #status-dot {
    position: fixed; bottom: 14px; right: 14px;
    width: 7px; height: 7px; border-radius: 50%;
    background: #4b5563;
    transition: background 0.5s ease;
  }
  #status-dot.connected { background: var(--ok-color); }
  #status-dot.error     { background: #ef4444; }

  /* ── Animations ── */
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 80px rgba(220,38,38,.55), 0 0 0   0  rgba(220,38,38,.7); }
    50%  { box-shadow: 0 0 80px rgba(220,38,38,.55), 0 0 0 36px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 80px rgba(220,38,38,.55), 0 0 0   0  rgba(220,38,38,0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div id="history-panel">
  <div id="hist-header">
    <span>Gespielt</span>
    <span id="hist-count">0 Tracks</span>
  </div>
  <div id="history-list"></div>
</div>

<div id="alert-container">
  <div id="alert-bubble">
    <div id="alert-icon">⛔</div>
    <div id="alert-label">Bereits gespielt!</div>
    <div id="alert-artist"></div>
    <div id="alert-title"></div>
    <div id="alert-score"></div>
  </div>
</div>

<div id="similar-panel">
  <div id="similar-header">Ähnliche Tracks dieser Session</div>
  <div id="similar-list"></div>
</div>

<div id="status-dot" title="Verbindungsstatus"></div>

<script>
// ── Config: von Swift per WKUserScript injiziert als window.__DjGuardConfig ──
// Fallback auf Defaults falls im Browser direkt geöffnet (zum Testen)
const CFG = window.__DjGuardConfig || {};
const WS_HOST     = CFG.host     || location.hostname || "127.0.0.1";
const WS_PORT     = CFG.port     || 8765;
const DURATION_MS = CFG.duration || 6000;
const SHOW_HIST   = CFG.history  !== false;

// CSS-Variablen aus Config anwenden
(function applyStyles() {
  const r = document.documentElement;
  if (CFG.alertBg)   r.style.setProperty("--alert-bg",   CFG.alertBg);
  if (CFG.alertText) r.style.setProperty("--alert-text", CFG.alertText);
  if (CFG.histBg)    r.style.setProperty("--hist-bg",    CFG.histBg);
  if (CFG.alertSize) r.style.setProperty("--alert-size", CFG.alertSize + "px");
  if (CFG.fontSize)  {
    r.style.setProperty("--font-track", CFG.fontSize + "px");
    r.style.setProperty("--font-sub",   Math.round(CFG.fontSize * 0.57) + "px");
  }
  if (CFG.opacity !== undefined) document.body.style.opacity = CFG.opacity;
  if (!SHOW_HIST) document.getElementById("history-panel").style.display = "none";
})();

// ── DOM Refs ──────────────────────────────────────────────────────────────────
const bubble     = document.getElementById("alert-bubble");
const alertArtist = document.getElementById("alert-artist");
const alertTitle  = document.getElementById("alert-title");
const alertScore  = document.getElementById("alert-score");
const histPanel  = document.getElementById("history-panel");
const histList   = document.getElementById("history-list");
const histCount  = document.getElementById("hist-count");
const simPanel   = document.getElementById("similar-panel");
const simList    = document.getElementById("similar-list");
const statusDot  = document.getElementById("status-dot");

// ── State ─────────────────────────────────────────────────────────────────────
let alertTimer  = null;
let histItems   = [];   // [{artist, title, isDup}]

// ── Alert anzeigen ────────────────────────────────────────────────────────────
function showAlert(track, matched, score, similar, isExact) {
  clearTimeout(alertTimer);

  alertArtist.textContent = track.artist || track.display || "?";
  alertTitle.textContent  = track.title  || "";

  if (matched) {
    const label = isExact ? "exakter Match" : score + "% ähnlich";
    alertScore.textContent = "↑ " + (matched.display || matched.artist || "?")
                             + " (" + label + ")";
    alertScore.style.display = "block";
  } else {
    alertScore.style.display = "none";
  }

  bubble.classList.remove("hide");
  void bubble.offsetWidth;
  bubble.classList.add("show");
  bubble.classList.remove("pulse");
  void bubble.offsetWidth;
  bubble.classList.add("pulse");

  if (similar && similar.length > 0) {
    simList.innerHTML = similar.map(s =>
      '<div class="similar-item">'
      + '<span>' + esc(s.display || s.artist + " – " + s.title) + '</span>'
      + '<span class="similar-score">' + s.score + '%</span>'
      + '</div>'
    ).join("");
    simPanel.classList.add("show");
  } else {
    simPanel.classList.remove("show");
  }

  alertTimer = setTimeout(hideAlert, DURATION_MS);
}

function hideAlert() {
  clearTimeout(alertTimer);
  bubble.classList.add("hide");
  bubble.classList.remove("show", "pulse");
  simPanel.classList.remove("show");
}

// ── History Panel ─────────────────────────────────────────────────────────────
function addHistoryItem(track, isDup) {
  histItems.unshift({ ...track, isDup });
  if (histItems.length > 120) histItems.pop();
  renderHistory();
  histPanel.classList.add("visible");
}

function clearHistory() {
  histItems = [];
  renderHistory();
}

function loadHistory(tracks) {
  histItems = tracks.map(t => ({ ...t, isDup: false })).reverse();
  renderHistory();
  if (histItems.length > 0) histPanel.classList.add("visible");
}

function renderHistory() {
  histCount.textContent = histItems.length + " Track" + (histItems.length !== 1 ? "s" : "");
  histList.innerHTML = histItems.map(item =>
    '<div class="history-item' + (item.isDup ? " dup" : "") + '">'
    + '<div class="h-artist">' + esc(item.artist || item.display || "") + '</div>'
    + (item.title ? '<div class="h-title">' + esc(item.title) + '</div>' : "")
    + '</div>'
  ).join("");
}

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws            = null;
let reconnectDelay = 1500;

function connect() {
  ws = new WebSocket("ws://" + WS_HOST + ":" + WS_PORT);

  ws.onopen = function() {
    statusDot.className = "connected";
    reconnectDelay = 1500;
    ws.send(JSON.stringify({
      action:   "hello",
      name:     "Overlay",
      device:   "Display",
      is_peer:  false,
      venue_id: "",
    }));
  };

  ws.onclose = function() {
    statusDot.className = "error";
    ws = null;
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 20000);
  };

  ws.onerror = function() {
    statusDot.className = "error";
  };

  ws.onmessage = function(evt) {
    var msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  var type = msg.type;

  if (type === "track_event") {
    var track  = msg.track   || {};
    var isDup  = !!msg.is_duplicate;
    addHistoryItem(track, isDup);
    if (isDup) {
      showAlert(track, msg.matched, msg.score, msg.similar, msg.is_exact);
    } else {
      hideAlert();
    }
  }

  else if (type === "welcome") {
    // Initiale History laden wenn wir uns verbinden
    if (msg.history && msg.history.length > 0) {
      loadHistory(msg.history);
    }
  }

  else if (type === "history_update") {
    if (msg.history) loadHistory(msg.history);
  }

  else if (type === "history_reset") {
    clearHistory();
    hideAlert();
  }
}

// ESC dismisst den Alert
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") hideAlert();
});

connect();
</script>
</body>
</html>
